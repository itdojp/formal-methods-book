<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root {
        --primary-blue: #2563eb;
        --secondary-indigo: #4f46e5;
        --accent-purple: #7c3aed;
        --neutral-gray: #6b7280;
        --light-gray: #f3f4f6;
        --success-green: #059669;
        --warning-orange: #d97706;
        --error-red: #dc2626;
      }

      .title-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
        font-size: 16px;
        font-weight: 600;
        fill: var(--neutral-gray);
      }

      .label-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
        font-size: 14px;
        font-weight: 500;
        fill: var(--neutral-gray);
      }

      .detail-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
        font-size: 12px;
        font-weight: 400;
        fill: var(--neutral-gray);
      }

      .specification-tool {
        rx: 4;
        ry: 4;
        stroke: var(--primary-blue);
        stroke-width: 2;
        fill: rgba(37, 99, 235, 0.1);
      }

      .verification-tool {
        rx: 4;
        ry: 4;
        stroke: var(--accent-purple);
        stroke-width: 2;
        fill: rgba(124, 58, 237, 0.1);
      }

      .proof-tool {
        rx: 4;
        ry: 4;
        stroke: var(--success-green);
        stroke-width: 2;
        fill: rgba(5, 150, 105, 0.1);
      }

      .integration-tool {
        rx: 4;
        ry: 4;
        stroke: var(--warning-orange);
        stroke-width: 2;
        fill: rgba(217, 119, 6, 0.1);
      }

      .workflow-arrow {
        stroke: var(--secondary-indigo);
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }

      .data-flow {
        stroke: var(--neutral-gray);
        stroke-width: 1;
        stroke-dasharray: 3, 3;
        opacity: 0.7;
      }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--secondary-indigo)" />
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" class="title-text">Formal Methods Tool Ecosystem</text>

  <g transform="translate(50, 60)">
    <text x="0" y="0" class="label-text">Specification Tools</text>

    <rect x="0" y="20" width="100" height="80" class="specification-tool" />
    <text x="50" y="40" text-anchor="middle" class="label-text">Alloy</text>
    <text x="10" y="55" class="detail-text">• Analyzer</text>
    <text x="10" y="70" class="detail-text">• Relational</text>
    <text x="10" y="85" class="detail-text">• Lightweight</text>

    <rect x="120" y="20" width="100" height="80" class="specification-tool" />
    <text x="170" y="40" text-anchor="middle" class="label-text">Z Notation</text>
    <text x="130" y="55" class="detail-text">• ZTC</text>
    <text x="130" y="70" class="detail-text">• CZT</text>
    <text x="130" y="85" class="detail-text">• State-based</text>

    <rect x="240" y="20" width="100" height="80" class="specification-tool" />
    <text x="290" y="40" text-anchor="middle" class="label-text">TLA+</text>
    <text x="250" y="55" class="detail-text">• TLA+ Tools</text>
    <text x="250" y="70" class="detail-text">• Temporal logic</text>
    <text x="250" y="85" class="detail-text">• Distributed</text>

    <rect x="360" y="20" width="100" height="80" class="specification-tool" />
    <text x="410" y="40" text-anchor="middle" class="label-text">CSP</text>
    <text x="370" y="55" class="detail-text">• FDR</text>
    <text x="370" y="70" class="detail-text">• ProB</text>
    <text x="370" y="85" class="detail-text">• Concurrency</text>
  </g>

  <g transform="translate(50, 200)">
    <text x="0" y="0" class="label-text">Model Checking Tools</text>

    <rect x="0" y="20" width="100" height="80" class="verification-tool" />
    <text x="50" y="40" text-anchor="middle" class="label-text">SPIN</text>
    <text x="10" y="55" class="detail-text">• Promela</text>
    <text x="10" y="70" class="detail-text">• Distributed</text>
    <text x="10" y="85" class="detail-text">• Protocols</text>

    <rect x="120" y="20" width="100" height="80" class="verification-tool" />
    <text x="170" y="40" text-anchor="middle" class="label-text">NuSMV</text>
    <text x="130" y="55" class="detail-text">• CTL/LTL</text>
    <text x="130" y="70" class="detail-text">• Symbolic</text>
    <text x="130" y="85" class="detail-text">• BDD</text>

    <rect x="240" y="20" width="100" height="80" class="verification-tool" />
    <text x="290" y="40" text-anchor="middle" class="label-text">TLC</text>
    <text x="250" y="55" class="detail-text">• For TLA+</text>
    <text x="250" y="70" class="detail-text">• Explicit-state</text>
    <text x="250" y="85" class="detail-text">• Parallel</text>

    <rect x="360" y="20" width="100" height="80" class="verification-tool" />
    <text x="410" y="40" text-anchor="middle" class="label-text">CBMC</text>
    <text x="370" y="55" class="detail-text">• C/C++</text>
    <text x="370" y="70" class="detail-text">• Bounded</text>
    <text x="370" y="85" class="detail-text">• SAT solver</text>
  </g>

  <g transform="translate(50, 340)">
    <text x="0" y="0" class="label-text">Theorem Proving Tools</text>

    <rect x="0" y="20" width="100" height="80" class="proof-tool" />
    <text x="50" y="40" text-anchor="middle" class="label-text">Coq</text>
    <text x="10" y="55" class="detail-text">• Dependent</text>
    <text x="10" y="70" class="detail-text">• Gallina</text>
    <text x="10" y="85" class="detail-text">• Extraction</text>

    <rect x="120" y="20" width="100" height="80" class="proof-tool" />
    <text x="170" y="40" text-anchor="middle" class="label-text">Isabelle</text>
    <text x="130" y="55" class="detail-text">• HOL</text>
    <text x="130" y="70" class="detail-text">• Sledgehammer</text>
    <text x="130" y="85" class="detail-text">• Automation</text>

    <rect x="240" y="20" width="100" height="80" class="proof-tool" />
    <text x="290" y="40" text-anchor="middle" class="label-text">Lean</text>
    <text x="250" y="55" class="detail-text">• Modern UI</text>
    <text x="250" y="70" class="detail-text">• Math library</text>
    <text x="250" y="85" class="detail-text">• VS Code</text>

    <rect x="360" y="20" width="100" height="80" class="proof-tool" />
    <text x="410" y="40" text-anchor="middle" class="label-text">Dafny</text>
    <text x="370" y="55" class="detail-text">• Practical</text>
    <text x="370" y="70" class="detail-text">• Automated</text>
    <text x="370" y="85" class="detail-text">• Code generation</text>
  </g>

  <g transform="translate(520, 120)">
    <text x="0" y="0" class="label-text">Integration &amp; Automation</text>

    <rect x="0" y="20" width="120" height="60" class="integration-tool" />
    <text x="60" y="40" text-anchor="middle" class="label-text">CI/CD</text>
    <text x="10" y="55" class="detail-text">• GitHub Actions</text>
    <text x="10" y="70" class="detail-text">• Jenkins</text>

    <rect x="0" y="100" width="120" height="60" class="integration-tool" />
    <text x="60" y="120" text-anchor="middle" class="label-text">IDE Integration</text>
    <text x="10" y="135" class="detail-text">• VS Code</text>
    <text x="10" y="150" class="detail-text">• IntelliJ</text>

    <rect x="0" y="180" width="120" height="60" class="integration-tool" />
    <text x="60" y="200" text-anchor="middle" class="label-text">Documentation</text>
    <text x="10" y="215" class="detail-text">• LaTeX output</text>
    <text x="10" y="230" class="detail-text">• Web output</text>

    <rect x="140" y="20" width="120" height="60" class="integration-tool" />
    <text x="200" y="40" text-anchor="middle" class="label-text">Version Control</text>
    <text x="150" y="55" class="detail-text">• Git integration</text>
    <text x="150" y="70" class="detail-text">• Change tracking</text>

    <rect x="140" y="100" width="120" height="60" class="integration-tool" />
    <text x="200" y="120" text-anchor="middle" class="label-text">Testing</text>
    <text x="150" y="135" class="detail-text">• Unit tests</text>
    <text x="150" y="150" class="detail-text">• Property tests</text>

    <rect x="140" y="180" width="120" height="60" class="integration-tool" />
    <text x="200" y="200" text-anchor="middle" class="label-text">Static Analysis</text>
    <text x="150" y="215" class="detail-text">• CBMC</text>
    <text x="150" y="230" class="detail-text">• KLEE</text>
  </g>

  <g>
    <line x1="250" y1="110" x2="250" y2="190" class="workflow-arrow" />
    <text x="260" y="150" class="detail-text">Verification</text>

    <line x1="250" y1="290" x2="250" y2="330" class="workflow-arrow" />
    <text x="260" y="315" class="detail-text">Proof</text>

    <line x1="470" y1="200" x2="510" y2="200" class="workflow-arrow" />
    <text x="475" y="190" class="detail-text">Integration</text>
  </g>

  <g transform="translate(50, 480)">
    <text x="0" y="0" class="label-text">Tool Categories</text>

    <rect x="0" y="20" width="15" height="15" class="specification-tool" />
    <text x="25" y="32" class="detail-text">Specification</text>

    <rect x="115" y="20" width="15" height="15" class="verification-tool" />
    <text x="140" y="32" class="detail-text">Model checking</text>

    <rect x="265" y="20" width="15" height="15" class="proof-tool" />
    <text x="290" y="32" class="detail-text">Theorem proving</text>

    <rect x="430" y="20" width="15" height="15" class="integration-tool" />
    <text x="455" y="32" class="detail-text">Integration &amp; automation</text>
  </g>

  <g transform="translate(50, 530)">
    <text x="0" y="0" class="label-text">Selection Criteria</text>

    <text x="0" y="20" class="detail-text">• Learning cost vs expressiveness</text>
    <text x="260" y="20" class="detail-text">• Automation vs control</text>
    <text x="500" y="20" class="detail-text">• Community support</text>
  </g>

  <text x="400" y="580" text-anchor="middle" class="detail-text">Figure 12-1: Formal Methods Tool Ecosystem and Selection Guidelines</text>
</svg>
