name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build:all
      - name: Verify generated documentation is committed
        run: |
          status="$(git status --porcelain --untracked-files=all -- docs)"
          if [ -n "$status" ]; then
            printf '%s\n' "$status"
            echo "Generated documentation is not fully committed." >&2
            exit 1
          fi
      - run: npm test
      - run: npm audit
