name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Translation status verifies immutable source/translation snapshots.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build:all
      - name: Verify generated publication artifacts are committed
        run: |
          status="$(git status --porcelain --untracked-files=all -- docs mobile-config.ja.json mobile-config.en.json)"
          if [ -n "$status" ]; then
            printf '%s\n' "$status"
            echo "Generated publication artifacts are not fully committed." >&2
            exit 1
          fi
      - run: npm test
      - name: Upload translation status report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: translation-status-report
          path: .artifacts/translation-status/report.json
          if-no-files-found: ignore
      - run: npm audit
