name: CI

on:
  push:
    branches: ["diagram-enhancement-phase6", "main"]
  pull_request:
    branches: ["diagram-enhancement-phase6", "main"]

jobs:
  lint-and-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci || npm i
      - run: npm test
