name: Formal checks

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      lane:
        description: Executable lane to run
        required: true
        default: nightly
        type: choice
        options:
          - nightly
          - optional
          - pr-quick
      tool:
        description: Manifest tool ID, or all
        required: true
        default: all
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  pr-quick:
    if: github.event_name == 'pull_request'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache manifest toolchain
        uses: actions/cache@v5
        with:
          path: tools/.cache
          key: formal-tools-${{ runner.os }}-${{ runner.arch }}-pr-quick-${{ hashFiles('tools/tool-manifest.json', 'examples/example-manifest.json', 'tools/bootstrap.sh', 'tools/lib/tool-manifest.sh') }}
      - name: Run related pr-quick examples
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash examples/ci/pr-quick-check.sh "$BASE_SHA" "$HEAD_SHA"
      - name: Upload manifest artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: formal-artifacts-pr
          path: .artifacts/manifest
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  matrix-plan:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Build validated tool matrix
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_LANE: ${{ inputs.lane || 'nightly' }}
          REQUESTED_TOOL: ${{ inputs.tool || 'all' }}
        run: node scripts/plan-formal-matrix.js --event "$EVENT_NAME" --lane "$REQUESTED_LANE" --tool "$REQUESTED_TOOL" >> "$GITHUB_OUTPUT"

  tool-matrix:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: matrix-plan
    timeout-minutes: 60
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Prepare tool-specific prerequisites
        run: bash examples/ci/prepare-tool.sh "${{ matrix.tool }}"
      - name: Cache manifest toolchain
        uses: actions/cache@v5
        with:
          path: tools/.cache
          key: formal-tools-${{ runner.os }}-${{ runner.arch }}-${{ matrix.tool }}-${{ hashFiles('tools/tool-manifest.json', 'examples/example-manifest.json', 'tools/bootstrap.sh', 'tools/lib/tool-manifest.sh', 'tools/nusmv-build-requirements.txt') }}
      - name: Run isolated tool contract
        run: bash examples/ci/matrix-tool-check.sh "${{ matrix.tool }}" "${{ matrix.profile }}"
      - name: Upload tool artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: formal-${{ matrix.tool }}-${{ matrix.profile }}-${{ github.run_attempt }}
          path: .artifacts/manifest
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
